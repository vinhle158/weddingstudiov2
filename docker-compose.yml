services:
  postgres:
    image: postgres:15-alpine
    container_name: studiov2_postgres
    restart: always
    environment:
      POSTGRES_USER: studio_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Hãy đặt POSTGRES_PASSWORD trong file .env}
      POSTGRES_DB: studio_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U studio_user -d studio_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
