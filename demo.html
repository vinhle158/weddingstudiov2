<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Will Studio — Bản trình diễn sản phẩm</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Đánh dấu để ứng dụng React bật lớp trình diễn sản phẩm.
      window.isDemoMode = true;
      
      // Tự thêm tham số demo để điều hướng luôn nhận đúng chế độ trình diễn.
      const url = new URL(window.location.href);
      if (url.searchParams.get('demo') !== 'true') {
        url.searchParams.set('demo', 'true');
        window.history.replaceState(null, '', url.toString());
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
